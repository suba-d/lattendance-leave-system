version: 1
frontend:
  phases:
    preBuild:
      commands:
        - corepack enable
        - corepack prepare pnpm@10.33.0 --activate
        - pnpm install --frozen-lockfile
    build:
      commands:
        # Apply pending migrations to Supabase (uses DIRECT_URL).
        - pnpm exec prisma migrate deploy
        # Seed leave types + admin user (idempotent upserts).
        - pnpm exec tsx prisma/seed.ts
        # Idempotent legacy import — only run when the dump is present
        # in the repo. The first deploy after merge has the file; once
        # we delete it (post-import-verified), this becomes a no-op
        # without paying tsx + Prisma cold-start time.
        - if [ -f leave_system_dump.sql ]; then pnpm exec tsx scripts/import-legacy.ts; fi
        # Amplify Hosting (SSR) doesn't reliably forward console-defined env
        # vars to the runtime Lambda. Write them into .env.production at
        # build time; Next.js automatically loads this file at runtime.
        # Note: TZ is intentionally excluded — the build environment leaks
        # a POSIX-style TZ=":UTC" that breaks JS Intl APIs at runtime. The
        # app falls back to Asia/Taipei via src/lib/env.ts when unset.
        - env | grep -E '^(AUTH_SECRET|DATABASE_URL|DIRECT_URL|APP_URL|AUTH_URL|TRUST_PROXY|OFFICE_IP_ALLOWLIST|WORK_START_HOUR|WORK_END_HOUR|SEED_ADMIN_|GOOGLE_|LINE_|NEXT_PUBLIC_LIFF_ID)=' > .env.production
        - pnpm build
  artifacts:
    baseDirectory: .next
    files:
      - "**/*"
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
      # pnpm content-addressable store — speeds up `pnpm install` on
      # subsequent builds by avoiding re-downloading every package.
      - ~/.local/share/pnpm/store/v3/**/*
      - ~/.pnpm-store/v3/**/*
